version: '3.8'
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hr_postgres_db
    environment:
      POSTGRES_USER: hr_admin
      POSTGRES_PASSWORD: hr_password
      POSTGRES_DB: hr_database
    ports:
      - "5432:5432"
    volumes:
      - hr_db_data:/var/lib/postgresql/data
volumes:
  hr_db_data:
